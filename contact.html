<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact &#8212; Rubber Deer Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">rbbrdrr</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Gallery</a>
        <a href="gear.html" class="nav-link">Gear</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="page-header">
      <h1 class="page-title">Contact</h1>
      <p class="page-subtitle">Get in touch</p>
    </div>
    <div class="contact-wrap">
      <form id="contact-form" class="contact-form" action="https://formspree.io/f/REPLACE_WITH_YOUR_ID" method="POST">
        <input type="hidden" name="_replyto" value="rbbrdrr@jaiydawoof.com" />
        <input type="hidden" name="_subject" value="New message from rbbrdrr.com" />
        <div class="form-group">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="subject" class="form-label">Subject</label>
          <input type="text" id="subject" name="subject" class="form-input" placeholder="What is this about?" />
        </div>
        <div class="form-group">
          <label for="message" class="form-label">Message</label>
          <textarea id="message" name="message" class="form-textarea" placeholder="Your message..." rows="6" required></textarea>
        </div>
        <button type="submit" class="form-submit">Send Message</button>
        <p id="form-status" class="form-status"></p>
      </form>
    </div>
  </main>

  <footer>
    <span>&copy; <span id="year"></span> Rubber Deer Photography</span>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    var form = document.getElementById('contact-form');
    var status = document.getElementById('form-status');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var data = new FormData(form);
      fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } })
        .then(function (r) {
          if (r.ok) {
            status.textContent = 'Message sent. Thank you.';
            status.className = 'form-status success';
            form.reset();
          } else {
            status.textContent = 'Something went wrong. Please try again.';
            status.className = 'form-status error';
          }
        }).catch(function () {
          status.textContent = 'Something went wrong. Please try again.';
          status.className = 'form-status error';
        });
    });
  </script>
</body>
</html>
